apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  # The ClusterIssuer requires cert-manager CRDs to be installed first.
  # We do this in the GitHub workflow prior to running 'helm upgrade'.
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # This email will receive notifications about expiring certificates
    email: admin@{{ .Values.ingress.hosts[0].host | default "example.com" }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: nginx
