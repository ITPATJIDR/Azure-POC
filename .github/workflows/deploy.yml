name: Build and Deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: "scgdevacr.azurecr.io"
  CLUSTER_NAME: "scg-dev-aks"
  RESOURCE_GROUP: "scg-dev-rg"

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # ปรับเวอร์ชัน Node.js ให้ตรงกับโปรเจกต์ของคุณ

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm run test --if-present

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm run test --if-present

  build-and-push:
    needs: test # รอให้ Job test ผ่านก่อนถึงจะเริ่ม Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name scgdevacr

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/taskflow-frontend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/taskflow-frontend:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/taskflow-frontend:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/taskflow-frontend:buildcache,mode=max

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/taskflow-backend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/taskflow-backend:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/taskflow-backend:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/taskflow-backend:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Create ACR Image Pull Secret
        run: |
          # Fetch credentials
          ACR_USERNAME=$(az acr credential show -n scgdevacr --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show -n scgdevacr --query passwords[0].value -o tsv)
          
          # Create or update the secret
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ env.ACR_LOGIN_SERVER }} \
            --docker-username=$ACR_USERNAME \
            --docker-password=$ACR_PASSWORD \
            --namespace default \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Cert-Manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          if ! helm status cert-manager -n cert-manager; then
            helm upgrade --install cert-manager jetstack/cert-manager \
              --namespace cert-manager \
              --create-namespace \
              --version v1.14.4 \
              --set installCRDs=true \
              --wait
          else
            echo "Cert-Manager already installed, skipping to avoid webhook conflict"
          fi

      - name: Update Helm Dependencies
        run: helm dependency update ./k8s/helm/taskflow

      - name: Deploy TaskFlow via Helm
        # Using the git commit SHA as the image tag guarantees we deploy the exact code we just built
        run: |
          helm upgrade --install taskflow ./k8s/helm/taskflow \
            --namespace default \
            --set frontend.image.tag=${{ github.sha }} \
            --set backend.image.tag=${{ github.sha }} \
            --set database.password=${{ secrets.DB_PASSWORD }} \
            --wait --timeout 5m
