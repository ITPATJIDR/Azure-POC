# ─────────────────────────────────────────────────────────────────────────────
#  SCG DevOps Take-Home Assignment
#  docker-compose.yml — local development
# ─────────────────────────────────────────────────────────────────────────────
name: scg-test

networks:
  scg-net:
    driver: bridge

services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scg-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_VERSION: "1.0.0"
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "3001:3001"
    networks:
      - scg-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scg-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - scg-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
